name: Pre-Release

on:
  push:
    branches:
      - next
    paths-ignore:
      - ".github/**"
      - "examples/**"
      - "README.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prerelease:
    permissions:
      contents: write
      id-token: write

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "latest"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
  
      - name: Set Git User
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Set NPM Config
        run: npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set Version
        id: version
        run: |
          pnpm version prerelease -m "chore(release): %s"
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build
        run: pnpm build

      - name: Commit
        run: git push --follow-tags


      - name: Publish
        run: pnpm publish --publish-branch next --access public --provenance --tag next

      - name: Pack `.tgz` file
        run: |
          npm pack
          mv *.tgz vapic-${{steps.version.outputs.version}}.tgz

      - name: Release Notes
        run: pnpm dlx changelogithub --prerelease --assets vapic-${{steps.version.outputs.version}}.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  

      