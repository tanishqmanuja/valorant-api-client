name: Pre-Release

on:
  push:
    branches:
      - next
    paths-ignore:
      - "README.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prerelease:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "latest"
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "latest"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
  
      - name: Set Git User
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Set NPM Config
        run: npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set Version
        id: version
        run: |
          NEW_VERSION=$(pnpm version prerelease)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: pnpm build

      - name: Publish
        run: pnpm publish --access public --provenance --tag next

      - name: Commit
        run: |
          git commit -am "chore: version"
          git push --follow-tags

      - name: Pack `.tgz` file
        run: |
          npm pack
          mv *.tgz vapic-${{steps.version.outputs.version}}.tgz

      - name: Release Notes
        run: pnpm dlx changelogithub --prerelease --assets vapic-${{steps.version.outputs.version}}.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  

      