name: Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
      id-token: write

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: pnpm

      - name: Set NPM Config
        run: npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish (w Dynamic Tags)
        id: publish
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -e

          VERSION=$(node -p "require('./package.json').version")
          PACKAGE=$(node -p "require('./package.json').name")

          echo "📦 Package: $PACKAGE"
          echo "🔖 Version: $VERSION"

          # Output version for other steps
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Detect prerelease tag (e.g., beta, rc)
          PRERELEASE_ID=$(echo "$VERSION" | grep -oP '(?<=-)[^.]+' || true)

          # Choose npm tag
          if [[ -n "$PRERELEASE_ID" ]]; then
            NPM_TAG="$PRERELEASE_ID"
          else
            NPM_TAG="latest"
          fi

          echo "🚀 Publishing with tag: $NPM_TAG"
          echo "🔐 Using provenance signing"
          pnpm publish --provenance --access public --tag "$NPM_TAG" --no-git-checks

          if [[ -n "$PRERELEASE_ID" ]]; then
            echo "🏷️ Tagging additionally as next"
            pnpm dist-tag add "$PACKAGE@$VERSION" "next"
          fi

      - name: Pack `.tgz` file
        run: |
          npm pack
          mv *.tgz vapic-${{steps.publish.outputs.version}}.tgz

      - name: Release Notes
        run: pnpm dlx changelogithub --prerelease --assets vapic-${{steps.publish.outputs.version}}.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
